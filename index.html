<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой сайт</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#222;
    color:white;
    padding:20px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-right:20px;
}

.hero{
    text-align:center;
    padding:120px 20px;
    min-height:500px;

    background-image: url("cover.png");
    background-size: cover;
    background-position: center;

    color:white;
    
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.hero h1{
    font-size:48px;
    margin-bottom:15px;
    text-shadow:0 2px 10px black;
}

.hero p{
    font-size:20px;
    color:white;
    text-shadow:0 2px 8px black;
}

.btn{
    display:inline-block;
    margin-top:25px;
    background:#0077ff;
    color:white;
    padding:12px 24px;
    border-radius:8px;
    text-decoration:none;
}

.btn:hover{
    background:#0055cc;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:40px 20px;
}

.card{
    background:white;
    width:280px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>

</head>

<body>

<header>
    <h2>Мой сайт</h2>

    <nav>
        <a href="#">Главная</a>
        <a href="#">Обо мне</a>
        <a href="#">Контакты</a>
    </nav>
</header>


<section class="hero">

    <h1>Добро пожаловать!</h1>

    <p>Я создал этот сайт самостоятельно на GitHub Pages.</p>

    <a class="btn" href="#" onclick="alert('Спасибо за посещение сайта!')">
        Узнать больше
    </a>

</section>


<section class="cards">

    <div class="card">
        <h3>Обо мне</h3>
        <p>Здесь будет информация обо мне.</p>
    </div>


    <div class="card">
        <h3>Мои проекты</h3>
        <p>Здесь будут мои работы и идеи.</p>
    </div>


    <div class="card">
        <h3>Контакты</h3>
        <p>Здесь будут способы связи со мной.</p>
    </div>

</section>


<footer>
    © 2025 Мой первый настоящий сайт
</footer>


</body>
</html>
